- name: Creating an ec2 instance for roboshop application
  hosts: local
  connection: local
  vars:
    instance_type: t3.micro
    instances: ["mongo", "redis", "mysql", "rabbitmq", "catalouge", "user", "cart", "shipping", "payment", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: chinnimaha.online
    action: create

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "roboshop-{{ item }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ image_id }}"
        region: us-east-1
        security_groups: 
          - "roboshop-{{ item }}"
          - "roboshop-common"
        tags:
          name: ec2
      loop: "{{ instances }}"
      register: ec2_instance
      when: action == "create"
      


    - name: print ec2 instance details
      debug:
        msg: "{{ ec2_instance }}"

    - name: print the private ip address of the instances
      debug:
        msg: 
        - "Instance name:{{ item.instances[0].tags.Name }}"
        - "Instance_name:{{ item.item }}"
        - "Private IP address: {{ item.instances[0].private_ip_address }}"
      loop: "{{ ec2_instance.results }}"
      ignore_errors: true
         
    - name: creating route53 records for instances
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_instance.results }}"
      when: action == "create"
    
    - name: creating route53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        overwrite: true
      loop: "{{ ec2_instance.results }}"
      when:
        - item.item == "frontend"
        - action == "create"
    
    - name: Deleting route 53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ item }}.{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: action == "delete"

    - name: deleting route53 record for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when:
        - item == "frontend"
        - action == "delete"
    
    - name: terminate ec2_instances
      amazon.aws.ec2_instance:
        state: absent
        name: roboshop-{{ item }}
        wait: false
        region: us-east-1
      loop: "{{ instances }}"
      when: action == "delete"


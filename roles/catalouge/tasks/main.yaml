- name: Installing nodejs & dependecies
  import_role:
    name: common
    Tasks_from: java.yaml

- name: Configuring app setup
  import_role:
    name: common
    Tasks_from: app_setup.yaml

- name: copy catalouge service
  template:
    src: catalouge.service.j2
    dest: /etc/systemd/system/catalogue.service
- name: copy mongo repo
  copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo
- name: installing mongo db
  package: 
    name: mongodb-mongosh
    state: present
- name: check catalogue schema exist ot not
  shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output
  tags:
    - mongodb
- name: print catalogue_output
  debug: 
      msg: "{{ catalogue_output }}"
  tags:
    - mongodb
- name: load products
  shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout | int < 0
  tags:
    - mongodb
# - name: load the data into database
#   shell: mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
- name: Configuring systemd services
  import_role:
    name: common
    Tasks_from: systemd-setup.yaml
- name: copy the mongodb repo
  copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

- name: install mongodb
  package: 
      name: mongodb-org
      state: present
  
- name: start and enable mongodb
  service:
      name: mongod
      state: started
      enabled: yes
  
- name: replace IP address
  replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'
  
- name: start and enable mongodb
  service:
      name: mongod
      state: restarted
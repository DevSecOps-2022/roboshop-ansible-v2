- name: disable default nodejs
  command: dnf module disable nodejs -y
- name: enable required nodejs
  command: dnf module enable nodejs:20 -y
- name: Installing nodejs
  package:
    name: nodejs
    state: present
- name: creating roboshop system user
  user:
    name: roboshop
    comment: "roboshop systemuser" 
    system: true
    home: /app
    shell: /sbin/nologin
- name: deleting the directory
  file:
    path: /app
    state: absent
- name: deleting temp directory
  file:
    path: /tmp/cart.zip
    state: absent
- name: creating directory
  file:
    path: /app
    state: directory
- name: downloading file
  get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
    dest: /tmp/cart.zip
- name: extracting the file
  unarchive:
    src: /tmp/cart.zip
    dest: /app
    remote_src: yes
- name: installing dependencies
  command: npm install
  args:
    chdir: /app
- name: copying service file
  template:
    src: cart.service.j2
    dest: /etc/systemd/system/cart.service
- name: daemon reload
  systemd_service:
    name: cart
    daemon_reload: true
- name: start & enable user
  service:
    name: cart
    state: restarted
    enabled: yes
  - name: configuring app setup
    import_role:
      name: common
      tasks_from: app_setup.yaml

  - name: copying service file
    template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service

  - name: configuring systemd services
    import_role:
      name: common
      tasks_from: systemd-setup.yaml
  